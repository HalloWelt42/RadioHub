# RadioHub - Top-Level Compose
#
# Ein-Befehl-Installation auf Pi und Mac:
#   docker compose up -d
#
# Frontend: http://localhost:9092
# Backend:  http://localhost:9091  (API direkt; im Frontend per Reverse-Proxy unter /api)
# Daten:    ./data   (Datenbank, Aufnahmen, Cache -- im Repo-Verzeichnis)

services:
  radiohub-backend:
    build: ./radiohub-backend
    container_name: radiohub-backend
    restart: unless-stopped
    ports:
      - "9091:8000"
    volumes:
      - ./data:/data
    environment:
      - DATA_PATH=/data
      - ALLOWED_ORIGINS=*
      - TZ=Europe/Berlin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  radiohub-frontend:
    build: ./radiohub-frontend
    container_name: radiohub-frontend
    restart: unless-stopped
    ports:
      - "9092:80"
    environment:
      - TZ=Europe/Berlin
    depends_on:
      - radiohub-backend
