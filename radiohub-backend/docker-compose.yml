# ============================================================
# RadioHub Docker Compose
# ============================================================
#
# Variante A: Einfach (ein Volume fuer alles)
#   Alles unter ~/radiohub-data, storage.json wird automatisch
#   mit Defaults erstellt. Funktioniert sofort.
#
# Variante B: Multi-Volume (SSD + HDD getrennt)
#   Auskommentierte Zeilen unten zeigen wie man Datenbank/Cache
#   auf SSD und Aufnahmen/Podcasts auf HDD verteilt.
#   Danach storage.json anpassen oder ueber Setup > Speicher
#   im Frontend konfigurieren.
#
# ============================================================

services:
  radiohub-backend:
    build: .
    container_name: radiohub-backend
    restart: unless-stopped
    ports:
      - "9091:8000"
    volumes:
      # --- Variante A: Ein Volume fuer alles ---
      - ~/radiohub-data:/data

      # --- Variante B: Multi-Volume (SSD + HDD) ---
      # SSD-Volumes (Datenbank, Cache, Config)
      # - radiohub-db:/data-ssd/db
      # - radiohub-cache:/data-ssd/cache
      # - radiohub-config:/data-ssd/config
      # HDD-Volumes (Aufnahmen, Podcasts)
      # - /mnt/hdd/radiohub/recordings:/data-hdd/recordings
      # - /mnt/hdd/radiohub/podcasts:/data-hdd/podcasts
    environment:
      - DATA_PATH=/data
      - ALLOWED_ORIGINS=*
      - TZ=Europe/Berlin
      # Fuer Variante B: Storage-Config explizit setzen
      # - STORAGE_CONFIG=/data-ssd/config/storage.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# Benannte Volumes (fuer Variante B)
# volumes:
#   radiohub-db:
#   radiohub-cache:
#   radiohub-config:
